# Development override - for local development with hot reload
services:
  mongodb:
    ports:
      - "27018:27017"

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
      target: build
    volumes:
      - ./src:/src
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - DOTNET_WATCH_RESTART_ON_RUDE_EDIT=true
    command: ["dotnet", "watch", "run", "--project", "/src/FamilyTree.Api/FamilyTree.Api.csproj", "--urls", "http://+:5000"]

  # Disable production frontend in development
  frontend:
    profiles:
      - production

  frontend-dev:
    image: node:22-alpine
    container_name: familytree-frontend-dev
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    environment:
      - VITE_GRAPHQL_URL=http://localhost:5001/graphql
    command: ["sh", "-c", "npm install && npm run dev"]
    depends_on:
      - api
    networks:
      - familytree-network

volumes:
  frontend_node_modules:
